name: Fetch Kill & Jump Stats


on:
  schedule:
    - cron: '17 * * * *'  # every hour at :17
  workflow_dispatch:      # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch ESI data
        run: python scripts/fetch_kills.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/kills/
          git diff --cached --quiet || git commit -m "chore: update kill/jump stats $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
