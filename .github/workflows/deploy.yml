name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 12 * * *'  # daily at 12:00 UTC — SDE check + deploy
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history so kill data commits are included

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Check and download SDE if updated
        run: python scripts/download_sde.py

      - name: Commit updated SDE version cache (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/sde_version.json
          git diff --cached --quiet || git commit -m "chore: update SDE version cache"
          git push

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_EVE_CLIENT_ID: ${{ secrets.EVE_CLIENT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
